<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#004f9e"/>
      <stop offset="100%" stop-color="#002a55"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc933"/>
      <stop offset="100%" stop-color="#e6a500"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <!-- Gold corner accent -->
  <path d="M480,128 L384,128 L384,32 Q480,32 480,128 Z" fill="url(#accent)" opacity="0.85"/>
  <!-- M letter (Bank Mandiri style) -->
  <text x="256" y="330" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="280" fill="url(#accent)" filter="url(#shadow)">M</text>
  <!-- Pin dot underneath -->
  <circle cx="256" cy="420" r="22" fill="#FFB700"/>
  <circle cx="256" cy="420" r="10" fill="#003D79"/>
</svg>
